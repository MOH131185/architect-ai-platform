name: Active App CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'genarch/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'genarch/**'

jobs:
  active-path:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run contract checks
      run: npm run check:contracts

    - name: Run genarch boundary contract check
      run: npm run check:genarch-contracts

    - name: Run compose core and routing test
      run: npm run test:compose:routing

    - name: Run DNA pipeline test
      run: npm run test:dna:pipeline

    - name: Run clinic A1 generation test
      run: npm run test:clinic:a1

    - name: Build active app path
      run: npm run build:active
      env:
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || 'test-key' }}
        REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'test-key' }}
        REACT_APP_OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY || 'test-key' }}

