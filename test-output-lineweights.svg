<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
<style><![CDATA[
    /* --- Text --- */
    .title {
      font-family: EmbeddedSans, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: bold;
      fill: #000000;
      text-anchor: middle;
    }
    .room-label {
      font-family: EmbeddedSans, Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: bold;
      fill: #000000;
      text-anchor: middle;
    }
    .area-label {
      font-family: EmbeddedSans, Arial, Helvetica, sans-serif;
      font-size: 9px;
      fill: #333333;
      text-anchor: middle;
    }

    /* --- Rooms --- */
    .room-fill {
      fill: #FFFFFF;
      stroke: none;
    }
    .circulation-fill {
      fill: #F5F5F5;
      stroke: none;
    }

    /* --- Walls --- */
    .wall-external-cut {
      fill: #1A1A1A;
      stroke: #000000;
      stroke-width: 4.13;
    }
    .wall-internal-fill {
      fill: #1A1A1A;
      stroke: #000000;
      stroke-width: 2.95;
    }
    .wall-poche line {
      stroke: #444444;
      stroke-width: 1.06;
    }

    /* --- Windows --- */
    .window {
      fill: #D6EAF8;
      stroke: #333333;
      stroke-width: 1.77;
    }
    .window-frame {
      fill: #333333;
      stroke: #000000;
      stroke-width: 1.48;
    }
    .window-glazing-bar {
      stroke: #333333;
      stroke-width: 1.77;
    }

    /* --- Doors --- */
    .door {
      fill: #6B4226;
      stroke: #000000;
      stroke-width: 1.48;
    }
    .door-opening {
      fill: #FFFFFF;
      stroke: none;
    }
    .door-swing {
      fill: none;
      stroke: #999999;
      stroke-width: 1.48;
      stroke-dasharray: 4 2;
    }

    /* --- Stairs --- */
    .stair-cut {
      fill: #F0F0F0;
      stroke: #000000;
      stroke-width: 1.48;
    }

    /* --- Elevation / Section backgrounds --- */
    .sky {
      fill: #E8F4FD;
    }
    .ground {
      fill: #D5E8D4;
    }
    .ground-line {
      stroke: #333333;
      stroke-width: 2.95;
    }

    /* --- Roof --- */
    .roof {
      fill: #C0C0C0;
      stroke: #222222;
      stroke-width: 2.95;
    }

    /* --- Slabs and Foundation --- */
    .slab-cut {
      fill: #D0D0D0;
      stroke: #000000;
      stroke-width: 1.48;
    }
    .foundation {
      fill: #C8B8A0;
      stroke: #000000;
      stroke-width: 1.48;
    }

    /* --- Hatching --- */
    .hatch {
      stroke: #666666;
      stroke-width: 1.06;
    }
    .hatch-slab {
      stroke: #666666;
      stroke-width: 0.8480000000000001;
    }

    /* --- Dimensions --- */
    .dimension line {
      stroke: #333333;
      stroke-width: 1.48;
    }
    .dimension-text {
      font-family: EmbeddedSans, Arial, Helvetica, sans-serif;
      font-size: 10px;
      fill: #333333;
      text-anchor: middle;
    }

    /* --- Level markers --- */
    .level-marker {
      stroke: #333333;
      stroke-width: 1.48;
    }
    .level-marker-dashed {
      stroke: #333333;
      stroke-width: 1.48;
      stroke-dasharray: 6 3;
    }
    .level-text {
      font-family: EmbeddedSans, Arial, Helvetica, sans-serif;
      font-size: 9px;
      fill: #000000;
    }
  ]]></style>
<rect width="600" height="500" fill="#FFFFFF"/>

<!-- Title -->
<text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Line Weight &amp; Hatch Verification</text>

<!-- Line weight comparison strip (left side) -->
<text x="20" y="55" font-family="Arial" font-size="10" fill="#333">Line Weights (ISO 128 / BS 8888):</text>

<line x1="20" y1="75" x2="200" y2="75" stroke="black" stroke-width="4.13"/>
<text x="210" y="79" font-family="Arial" font-size="9" fill="#666">Wall cut: 0.7mm → 4.13px</text>

<line x1="20" y1="95" x2="200" y2="95" stroke="black" stroke-width="2.95"/>
<text x="210" y="99" font-family="Arial" font-size="9" fill="#666">Wall profile: 0.5mm → 2.95px</text>

<line x1="20" y1="115" x2="200" y2="115" stroke="black" stroke-width="1.77"/>
<text x="210" y="119" font-family="Arial" font-size="9" fill="#666">Glazing bar: 0.3mm → 1.77px</text>

<line x1="20" y1="135" x2="200" y2="135" stroke="black" stroke-width="1.48"/>
<text x="210" y="139" font-family="Arial" font-size="9" fill="#666">Annotation: 0.25mm → 1.48px</text>

<line x1="20" y1="155" x2="200" y2="155" stroke="black" stroke-width="1.06"/>
<text x="210" y="159" font-family="Arial" font-size="9" fill="#666">Hatch: 0.18mm → 1.06px</text>

<!-- Material hatch pattern samples (right side) -->
<text x="20" y="195" font-family="Arial" font-size="10" fill="#333">Material Hatch Patterns:</text>

<!-- Brick stretcher bond -->
<defs>
  <pattern id="demo-brick" patternUnits="userSpaceOnUse" width="18" height="7.2">
    <line x1="0" y1="3.6" x2="18" y2="3.6" stroke="#444444" stroke-width="1.06"/>
    <line x1="0" y1="0" x2="0" y2="3.6" stroke="#444444" stroke-width="1.06"/>
    <line x1="9" y1="0" x2="9" y2="3.6" stroke="#444444" stroke-width="1.06"/>
    <line x1="18" y1="0" x2="18" y2="3.6" stroke="#444444" stroke-width="1.06"/>
    <line x1="0" y1="7.2" x2="18" y2="7.2" stroke="#444444" stroke-width="1.06"/>
    <line x1="4.5" y1="3.6" x2="4.5" y2="7.2" stroke="#444444" stroke-width="1.06"/>
    <line x1="13.5" y1="3.6" x2="13.5" y2="7.2" stroke="#444444" stroke-width="1.06"/>
  </pattern>
  <pattern id="demo-concrete" patternUnits="userSpaceOnUse" width="4.5" height="4.5">
    <line x1="0" y1="0" x2="4.5" y2="4.5" stroke="#444444" stroke-width="1.06"/>
    <line x1="4.5" y1="0" x2="0" y2="4.5" stroke="#444444" stroke-width="1.06"/>
  </pattern>
  <pattern id="demo-timber" patternUnits="userSpaceOnUse" width="3.6" height="28.8">
    <line x1="1.8" y1="0" x2="1.8" y2="28.8" stroke="#444444" stroke-width="1.06"/>
    <circle cx="1.8" cy="11.52" r="1.08" fill="none" stroke="#444444" stroke-width="1.06"/>
  </pattern>
  <pattern id="demo-block" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="6" stroke="#444444" stroke-width="1.06"/>
  </pattern>
</defs>

<!-- Brick sample -->
<rect x="20" y="210" width="80" height="40" fill="url(#demo-brick)" stroke="black" stroke-width="4.13"/>
<text x="110" y="235" font-family="Arial" font-size="9" fill="#666">Brick (stretcher bond)</text>

<!-- Concrete sample -->
<rect x="20" y="265" width="80" height="40" fill="url(#demo-concrete)" stroke="black" stroke-width="4.13"/>
<text x="110" y="290" font-family="Arial" font-size="9" fill="#666">Concrete (cross-hatch)</text>

<!-- Timber sample -->
<rect x="20" y="320" width="80" height="40" fill="url(#demo-timber)" stroke="black" stroke-width="4.13"/>
<text x="110" y="345" font-family="Arial" font-size="9" fill="#666">Timber (vertical + knots)</text>

<!-- Block/render sample -->
<rect x="20" y="375" width="80" height="40" fill="url(#demo-block)" stroke="black" stroke-width="4.13"/>
<text x="110" y="400" font-family="Arial" font-size="9" fill="#666">Block/render (diagonal 45°)</text>

<!-- Mini floor plan demo (bottom) -->
<text x="320" y="195" font-family="Arial" font-size="10" fill="#333">Mini Floor Plan (brick walls):</text>

<!-- External wall ring with brick hatch -->
<rect x="310" y="210" width="250" height="180" fill="url(#demo-brick)" stroke="black" stroke-width="4.13"/>
<rect x="325" y="225" width="220" height="150" fill="white" stroke="black" stroke-width="2.95"/>

<!-- Internal wall -->
<rect x="430" y="225" width="6" height="150" fill="#1A1A1A" stroke="black" stroke-width="2.95"/>

<!-- Room labels -->
<text x="375" y="305" text-anchor="middle" class="room-label">Living</text>
<text x="375" y="320" text-anchor="middle" class="area-label">22 m²</text>
<text x="500" y="305" text-anchor="middle" class="room-label">Kitchen</text>
<text x="500" y="320" text-anchor="middle" class="area-label">15 m²</text>

<!-- Window symbol -->
<rect x="410" y="210" width="30" height="12" fill="#D6EAF8" stroke="#333333" stroke-width="1.77"/>
<line x1="425" y1="210" x2="425" y2="222" stroke="#333333" stroke-width="1.77"/>

<!-- Door symbol -->
<rect x="340" y="210" width="20" height="10" fill="#6B4226" stroke="black" stroke-width="1.48"/>

<!-- Dimension line -->
<line x1="310" y1="410" x2="560" y2="410" stroke="#333333" stroke-width="1.48"/>
<text x="435" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#333333">12.50 m</text>

</svg>